name: restaurant
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  lottie: ^2.7.0
  shared_preferences: ^2.5.4
  carousel_slider: ^5.1.2
  http: ^1.6.0
  provider: ^6.1.5+1

  # This single line handles all your Poppins font needs!
  google_fonts: ^6.1.0

  google_sign_in: ^6.2.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  mobile_scanner: ^7.2.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  socket_io_client: ^3.1.4
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  razorpay_flutter: ^1.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
